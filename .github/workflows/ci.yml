name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm build 2>&1 | tee build.log

      - name: Test
        id: test
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm test:cov 2>&1 | tee test.log

      - name: Upload coverage to Codecov
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Comment build & test results
        if: github.event_name == 'pull_request' && always()
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          TEST_OUTCOME: ${{ steps.test.outcome }}
        with:
          script: |
            const fs = require('fs');
            const tail = (file, n) => {
              try {
                return fs.readFileSync(file, 'utf8').replace(/\x1b\[[0-9;]*m/g, '').trimEnd().split('\n').slice(-n).join('\n');
              } catch {
                return '(log unavailable)';
              }
            };
            const badge = (o) => (o === 'success' ? '✅ Success' : '❌ Failure');
            const marker = '<!-- ci-build-test-result -->';
            const body = [
              marker,
              `**Build Result:** ${badge(process.env.BUILD_OUTCOME)}`,
              '',
              '<details><summary>Last 50 lines of build log</summary>',
              '',
              '```',
              tail('build.log', 50),
              '```',
              '',
              '</details>',
              '',
              `**Test Result:** ${badge(process.env.TEST_OUTCOME)}`,
              '',
              '<details><summary>Last 100 lines of test log</summary>',
              '',
              '```',
              tail('test.log', 100),
              '```',
              '',
              '</details>',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find((c) => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Fail if build or tests failed
        if: always()
        run: |
          [ "${{ steps.build.outcome }}" = "success" ] && [ "${{ steps.test.outcome }}" = "success" ]
